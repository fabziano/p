<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Revisão</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='2 1 20 20'><path fill='%2300e88f' d='M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <svg id="svg" width="200" height="200" viewBox="2 1 20 20" fill="var(--destaque)" aria-hidden="true"><path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/></svg>
        <h1 id="titulo"></h1>
        <div id="barra" role="progressbar" aria-label="Progresso do áudio" tabindex="0"><div id="cheio"></div></div>
        <nav class="controles">
            <button id="voltar" aria-label="Faixa anterior"><svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="play-btn" id="acao" aria-label="Reproduzir ou pausar">
                <svg id="icon-play" width="50" height="50" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" width="50" height="50" viewBox="0 0 24 24" fill="currentColor" style="display:none" aria-hidden="true"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="pular" aria-label="Próxima faixa"><svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </nav>
        <section id="lista"></section>
    </main>
    <audio id="audio-engine" preload="metadata"></audio>
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
